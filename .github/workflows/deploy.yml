name: Deploy to GitHub Pages

on:
  # Run on every push to main
  push:
    branches: [main]
  # Allow manual triggering from the Actions tab
  workflow_dispatch:

# Permissions needed to push to the gh-pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Cancel any in-progress runs when a new one starts
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        # GITHUB_REPO is read by vite.config.ts to set the public base path
        # to /<repo>/ so assets resolve correctly under GitHub Pages.
        env:
          GITHUB_REPO: ${{ github.event.repository.name }}
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
